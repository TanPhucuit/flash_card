<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tạo bộ từ mới</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary-fixed": "#e1e0ff",
                      "surface-container-highest": "#d3e4fe",
                      "on-error": "#ffffff",
                      "primary": "#4648d4",
                      "on-primary-fixed-variant": "#2f2ebe",
                      "surface-bright": "#f8f9ff",
                      "on-secondary-fixed": "#002113",
                      "inverse-primary": "#c0c1ff",
                      "surface-container": "#e5eeff",
                      "surface-container-low": "#eff4ff",
                      "tertiary-fixed": "#ffdad7",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary": "#ffffff",
                      "tertiary-fixed-dim": "#ffb3ad",
                      "tertiary": "#b61722",
                      "on-primary-container": "#fffbff",
                      "secondary-fixed": "#6ffbbe",
                      "inverse-surface": "#213145",
                      "secondary-container": "#6cf8bb",
                      "surface-variant": "#d3e4fe",
                      "on-secondary-fixed-variant": "#005236",
                      "secondary-fixed-dim": "#4edea3",
                      "inverse-on-surface": "#eaf1ff",
                      "outline-variant": "#c7c4d7",
                      "error": "#ba1a1a",
                      "on-background": "#0b1c30",
                      "background": "#f8f9ff",
                      "on-primary": "#ffffff",
                      "primary-container": "#6063ee",
                      "on-error-container": "#93000a",
                      "on-secondary": "#ffffff",
                      "error-container": "#ffdad6",
                      "surface": "#f8f9ff",
                      "on-surface": "#0b1c30",
                      "on-surface-variant": "#464554",
                      "surface-dim": "#cbdbf5",
                      "on-secondary-container": "#00714d",
                      "surface-tint": "#494bd6",
                      "tertiary-container": "#da3437",
                      "on-tertiary-container": "#fffbff",
                      "on-tertiary-fixed": "#410004",
                      "outline": "#767586",
                      "on-tertiary-fixed-variant": "#930013",
                      "surface-container-high": "#dce9ff",
                      "secondary": "#006c49",
                      "primary-fixed-dim": "#c0c1ff",
                      "on-primary-fixed": "#07006c"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "touch-target-min": "2.75rem",
                      "section-gap": "1.5rem",
                      "container-margin": "1rem",
                      "inline-padding": "1rem",
                      "stack-gap": "0.75rem"
              },
              "fontFamily": {
                      "body-md": [
                              "Inter"
                      ],
                      "label-sm": [
                              "Inter"
                      ],
                      "body-lg": [
                              "Inter"
                      ],
                      "display-flashcard": [
                              "Inter"
                      ],
                      "headline-lg": [
                              "Inter"
                      ],
                      "label-lg": [
                              "Inter"
                      ],
                      "headline-md": [
                              "Inter"
                      ]
              },
              "fontSize": {
                      "body-md": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "400"
                              }
                      ],
                      "label-sm": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "fontWeight": "500"
                              }
                      ],
                      "body-lg": [
                              "16px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      ],
                      "display-flashcard": [
                              "32px",
                              {
                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "headline-lg": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "fontWeight": "700"
                              }
                      ],
                      "label-lg": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "letterSpacing": "0.01em",
                                      "fontWeight": "600"
                              }
                      ],
                      "headline-md": [
                              "20px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "600"
                              }
                      ]
              }
      },
          },
        }
      </script>
<style>
        body {
            background-color: #F8FAFC; /* Level 0 Base */
            color: #0b1c30;
        }
        
        .card-shadow {
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.06);
        }
        
        .floating-shadow {
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.12);
        }
        
        /* Smooth transitions for collapsibles */
        .collapsible-content {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out, padding 0.3s ease-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            padding-top: 0;
            padding-bottom: 0;
        }
        
        .collapsible-content.expanded {
            max-height: 1000px; /* Arbitrary large number */
            opacity: 1;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        
        .chevron-icon {
            transition: transform 0.3s ease;
        }
        
        .expanded + .chevron-icon {
            transform: rotate(180deg);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-body-md antialiased pb-24 min-h-screen relative">
<!-- Top App Bar -->
<header class="bg-surface dark:bg-on-background docked full-width top-0 sticky z-40 flex justify-between items-center h-16 px-4 w-full flat no shadows">
<button aria-label="Go back" class="text-on-surface-variant dark:text-surface-variant hover:opacity-80 active:scale-90 transition-all flex items-center justify-center w-10 h-10 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed flex-1 text-center">Tạo bộ từ mới</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="px-container-margin py-section-gap flex flex-col gap-section-gap max-w-md mx-auto">
<!-- Section 1: Thông tin bộ từ (Collapsible) -->
<section class="bg-surface-container-lowest rounded-xl card-shadow overflow-hidden">
<button class="w-full px-4 py-4 flex items-center justify-between bg-surface-container-lowest hover:bg-surface-container-low transition-colors" onclick="toggleSection('info-section', 'info-chevron')">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">info</span>
<h2 class="font-headline-md text-headline-md text-on-surface">Thông tin bộ từ</h2>
</div>
<span class="material-symbols-outlined text-on-surface-variant transition-transform duration-300" id="info-chevron">expand_more</span>
</button>
<div class="collapsible-content px-4 bg-surface-container-lowest border-t border-surface-variant expanded" id="info-section" style="max-height: 500px; opacity: 1; padding-top: 1rem; padding-bottom: 1rem;">
<div class="flex flex-col gap-stack-gap">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="deck-title">Tên bộ từ <span class="text-error">*</span></label>
<input class="w-full h-12 px-3 rounded-lg border border-outline-variant bg-surface-bright text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md" id="deck-title" placeholder="VD: IELTS Vocabulary, Tiếng Anh Giao Tiếp..." type="text"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="deck-desc">Mô tả</label>
<textarea class="w-full p-3 rounded-lg border border-outline-variant bg-surface-bright text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md resize-none" id="deck-desc" placeholder="Mô tả ngắn gọn về bộ từ này..." rows="3"></textarea>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="deck-tags">Thẻ (Tags)</label>
<input class="w-full h-12 px-3 rounded-lg border border-outline-variant bg-surface-bright text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md" id="deck-tags" placeholder="Thêm thẻ, phân cách bằng dấu phẩy..." type="text"/>
</div>
</div>
</div>
</section>
<!-- Section 2: Danh sách từ vựng -->
<section>
<div class="flex items-center justify-between mb-4">
<h2 class="font-headline-md text-headline-md text-on-surface">Danh sách từ vựng</h2>
<span class="font-label-sm text-label-sm text-on-surface-variant bg-surface-container px-2 py-1 rounded-full">1 từ</span>
</div>
<div class="flex flex-col gap-stack-gap" id="word-list">
<!-- Word Card Editor (Collapsible) -->
<div class="bg-surface-container-lowest rounded-xl card-shadow overflow-hidden border border-outline-variant/30">
<!-- Header summary (visible when collapsed) -->
<div class="px-4 py-3 flex items-center justify-between cursor-pointer hover:bg-surface-container-low transition-colors" onclick="toggleSection('word-1', 'word-1-chevron')">
<div class="flex items-center gap-3">
<span class="font-label-lg text-label-lg text-on-surface-variant bg-surface-container w-8 h-8 rounded-full flex items-center justify-center">1</span>
<div>
<h3 class="font-label-lg text-label-lg text-on-surface">Hello</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">Xin chào</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="text-error p-2 rounded-full hover:bg-error-container/50 transition-colors" onclick="event.stopPropagation();">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
<span class="material-symbols-outlined text-on-surface-variant transition-transform duration-300" id="word-1-chevron">expand_less</span>
</div>
</div>
<!-- Detailed Editor Form -->
<div class="collapsible-content px-4 bg-surface-bright border-t border-surface-variant expanded" id="word-1" style="max-height: 1000px; opacity: 1; padding-top: 1rem; padding-bottom: 1rem;">
<div class="flex flex-col gap-stack-gap">
<!-- Word & IPA Row -->
<div class="grid grid-cols-2 gap-3">
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1">Từ vựng <span class="text-error">*</span></label>
<input class="w-full h-10 px-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md" type="text" value="Hello"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1">Phiên âm (IPA)</label>
<input class="w-full h-10 px-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md" type="text" value="/həˈləʊ/"/>
</div>
</div>
<!-- Meaning -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1">Nghĩa <span class="text-error">*</span></label>
<input class="w-full h-10 px-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md" type="text" value="Xin chào"/>
</div>
<!-- Definition -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1">Định nghĩa (Tùy chọn)</label>
<textarea class="w-full p-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md resize-none" rows="2">Used as a greeting or to begin a telephone conversation.</textarea>
</div>
<!-- Example -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1">Ví dụ</label>
<textarea class="w-full p-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md resize-none" rows="2">Hello, how are you?</textarea>
</div>
</div>
</div>
</div>
</div>
<!-- Add New Card Button -->
<button class="mt-4 w-full h-[52px] rounded-xl border-2 border-dashed border-outline-variant hover:border-primary hover:bg-surface-container-low text-on-surface-variant hover:text-primary transition-all flex items-center justify-center gap-2 font-label-lg text-label-lg">
<span class="material-symbols-outlined">add_circle</span>
                Thêm thẻ mới
            </button>
</section>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-outline-variant/20 p-4 floating-shadow z-50 flex gap-3 pb-8"> <!-- pb-8 for safe area -->
<button class="flex-1 h-[48px] rounded-lg border border-outline-variant bg-surface-bright text-on-surface font-label-lg text-label-lg hover:bg-surface-container transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">upload_file</span>
            Import CSV
        </button>
<button class="flex-[2] h-[48px] rounded-lg bg-primary text-on-primary font-label-lg text-label-lg hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-md active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">save</span>
            Lưu bộ từ
        </button>
</div>
<script>
        function toggleSection(contentId, chevronId) {
            const content = document.getElementById(contentId);
            const chevron = document.getElementById(chevronId);
            
            if (content.classList.contains('expanded')) {
                // Collapse
                content.style.maxHeight = '0px';
                content.style.opacity = '0';
                content.style.paddingTop = '0';
                content.style.paddingBottom = '0';
                content.classList.remove('expanded');
                if(chevron) chevron.style.transform = 'rotate(0deg)';
            } else {
                // Expand
                content.classList.add('expanded');
                content.style.maxHeight = '1000px'; // Arbitrary large height
                content.style.opacity = '1';
                content.style.paddingTop = '1rem';
                content.style.paddingBottom = '1rem';
                if(chevron) chevron.style.transform = 'rotate(180deg)';
            }
        }
    </script>
</body></html>
