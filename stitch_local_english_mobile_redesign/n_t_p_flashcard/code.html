<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mobile Flashcard Study</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary-fixed": "#e1e0ff",
                      "surface-container-highest": "#d3e4fe",
                      "on-error": "#ffffff",
                      "primary": "#4648d4",
                      "on-primary-fixed-variant": "#2f2ebe",
                      "surface-bright": "#f8f9ff",
                      "on-secondary-fixed": "#002113",
                      "inverse-primary": "#c0c1ff",
                      "surface-container": "#e5eeff",
                      "surface-container-low": "#eff4ff",
                      "tertiary-fixed": "#ffdad7",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary": "#ffffff",
                      "tertiary-fixed-dim": "#ffb3ad",
                      "tertiary": "#b61722",
                      "on-primary-container": "#fffbff",
                      "secondary-fixed": "#6ffbbe",
                      "inverse-surface": "#213145",
                      "secondary-container": "#6cf8bb",
                      "surface-variant": "#d3e4fe",
                      "on-secondary-fixed-variant": "#005236",
                      "secondary-fixed-dim": "#4edea3",
                      "inverse-on-surface": "#eaf1ff",
                      "outline-variant": "#c7c4d7",
                      "error": "#ba1a1a",
                      "on-background": "#0b1c30",
                      "background": "#f8f9ff",
                      "on-primary": "#ffffff",
                      "primary-container": "#6063ee",
                      "on-error-container": "#93000a",
                      "on-secondary": "#ffffff",
                      "error-container": "#ffdad6",
                      "surface": "#f8f9ff",
                      "on-surface": "#0b1c30",
                      "on-surface-variant": "#464554",
                      "surface-dim": "#cbdbf5",
                      "on-secondary-container": "#00714d",
                      "surface-tint": "#494bd6",
                      "tertiary-container": "#da3437",
                      "on-tertiary-container": "#fffbff",
                      "on-tertiary-fixed": "#410004",
                      "outline": "#767586",
                      "on-tertiary-fixed-variant": "#930013",
                      "surface-container-high": "#dce9ff",
                      "secondary": "#006c49",
                      "primary-fixed-dim": "#c0c1ff",
                      "on-primary-fixed": "#07006c"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "touch-target-min": "2.75rem",
                      "section-gap": "1.5rem",
                      "container-margin": "1rem",
                      "inline-padding": "1rem",
                      "stack-gap": "0.75rem"
              },
              "fontFamily": {
                      "body-md": ["Inter"],
                      "label-sm": ["Inter"],
                      "body-lg": ["Inter"],
                      "display-flashcard": ["Inter"],
                      "headline-lg": ["Inter"],
                      "label-lg": ["Inter"],
                      "headline-md": ["Inter"]
              },
              "fontSize": {
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "display-flashcard": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
              }
            }
          }
        }
      </script>
<style>
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .card-shadow {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
        }
        .controls-shadow {
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface h-screen w-screen overflow-hidden flex flex-col font-body-md">
<!-- Top App Bar -->
<header class="flex justify-between items-center h-16 px-container-margin w-full bg-surface z-40 shrink-0">
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center text-on-surface-variant hover:opacity-80 active:scale-90 transition-all rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="flex-1 px-4 flex flex-col items-center">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-1">12 / 50</span>
<div class="w-full h-2 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-300" style="width: 24%"></div>
</div>
</div>
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center text-on-surface-variant hover:opacity-80 active:scale-90 transition-all rounded-full">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 relative flex flex-col items-center justify-center px-container-margin pb-32">
<!-- Flashcard Container -->
<div class="w-full max-w-sm aspect-[3/4] perspective-1000 group cursor-pointer" onclick="this.querySelector('.inner-card').classList.toggle('rotate-y-180')">
<div class="inner-card relative w-full h-full transition-transform duration-500 transform-style-3d">
<!-- Front of Card -->
<div class="absolute inset-0 backface-hidden bg-surface-container-lowest rounded-xl card-shadow flex flex-col items-center justify-center p-6 text-center border border-surface-variant">
<button class="absolute top-4 right-4 w-touch-target-min h-touch-target-min flex items-center justify-center text-outline hover:text-tertiary-container transition-colors rounded-full" onclick="event.stopPropagation(); this.querySelector('span').classList.toggle('text-tertiary-container'); this.querySelector('span').style.fontVariationSettings = this.querySelector('span').style.fontVariationSettings ? '' : '&quot;FILL&quot; 1'">
<span class="material-symbols-outlined transition-all" data-icon="star">star</span>
</button>
<div class="flex-1 flex flex-col items-center justify-center gap-4 w-full mt-8">
<h1 class="font-display-flashcard text-display-flashcard text-on-surface break-words max-w-full">abandon</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">/əˈbændən/</p>
<button class="mt-2 w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary hover:bg-surface-variant transition-colors active:scale-95" onclick="event.stopPropagation();">
<span class="material-symbols-outlined" data-icon="volume_up" data-weight="fill" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</button>
</div>
<div class="mt-auto pt-6 text-outline-variant flex flex-col items-center gap-2">
<span class="material-symbols-outlined animate-bounce" data-icon="touch_app">touch_app</span>
<span class="font-label-sm text-label-sm">Chạm để lật thẻ</span>
</div>
</div>
<!-- Back of Card -->
<div class="absolute inset-0 backface-hidden rotate-y-180 bg-surface-container-lowest rounded-xl card-shadow flex flex-col items-center p-6 text-center border border-surface-variant overflow-y-auto">
<button class="absolute top-4 right-4 w-touch-target-min h-touch-target-min flex items-center justify-center text-outline hover:text-tertiary-container transition-colors rounded-full" onclick="event.stopPropagation();">
<span class="material-symbols-outlined" data-icon="star">star</span>
</button>
<div class="w-full mt-8 space-y-6">
<div>
<span class="inline-block px-3 py-1 bg-surface-container text-primary font-label-sm text-label-sm rounded-full mb-2">Động từ</span>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">từ bỏ, bỏ rơi</h2>
</div>
<div class="text-left w-full bg-surface-container-low p-4 rounded-lg">
<p class="font-body-md text-body-md text-on-surface-variant italic mb-1">"They were forced to abandon the car."</p>
<p class="font-body-md text-body-md text-on-surface">Họ đã buộc phải bỏ lại chiếc xe.</p>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Controls -->
<div class="fixed bottom-0 w-full bg-surface controls-shadow rounded-t-xl z-50 px-container-margin py-4 pb-6 safe-area-pb">
<!-- Secondary Navigation Controls -->
<div class="flex justify-between items-center mb-4 px-2">
<button class="text-on-surface-variant flex items-center gap-1 font-label-lg text-label-lg active:scale-95 transition-transform p-2">
<span class="material-symbols-outlined text-lg" data-icon="chevron_left">chevron_left</span>
                Trước
            </button>
<button class="text-on-surface-variant flex items-center gap-1 font-label-lg text-label-lg active:scale-95 transition-transform p-2">
                Tiếp
                <span class="material-symbols-outlined text-lg" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Primary Actions -->
<div class="flex gap-stack-gap">
<button class="flex-1 h-14 rounded-xl bg-error-container text-on-error-container font-label-lg text-label-lg flex flex-col items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined mb-0.5 text-sm" data-icon="close">close</span>
                Chưa thuộc
            </button>
<button class="flex-none w-16 h-14 rounded-xl border border-outline-variant text-on-surface-variant flex items-center justify-center active:scale-95 transition-transform" onclick="document.querySelector('.inner-card').classList.toggle('rotate-y-180')">
<span class="material-symbols-outlined" data-icon="flip">flip</span>
</button>
<button class="flex-1 h-14 rounded-xl bg-secondary-container text-on-secondary-container font-label-lg text-label-lg flex flex-col items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined mb-0.5 text-sm" data-icon="check">check</span>
                Đã thuộc
            </button>
</div>
</div>
</body></html>
