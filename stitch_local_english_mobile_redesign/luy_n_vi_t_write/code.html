<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Write Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#e1e0ff",
                        "surface-container-highest": "#d3e4fe",
                        "on-error": "#ffffff",
                        "primary": "#4648d4",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "surface-bright": "#f8f9ff",
                        "on-secondary-fixed": "#002113",
                        "inverse-primary": "#c0c1ff",
                        "surface-container": "#e5eeff",
                        "surface-container-low": "#eff4ff",
                        "tertiary-fixed": "#ffdad7",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "tertiary": "#b61722",
                        "on-primary-container": "#fffbff",
                        "secondary-fixed": "#6ffbbe",
                        "inverse-surface": "#213145",
                        "secondary-container": "#6cf8bb",
                        "surface-variant": "#d3e4fe",
                        "on-secondary-fixed-variant": "#005236",
                        "secondary-fixed-dim": "#4edea3",
                        "inverse-on-surface": "#eaf1ff",
                        "outline-variant": "#c7c4d7",
                        "error": "#ba1a1a",
                        "on-background": "#0b1c30",
                        "background": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "primary-container": "#6063ee",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface": "#f8f9ff",
                        "on-surface": "#0b1c30",
                        "on-surface-variant": "#464554",
                        "surface-dim": "#cbdbf5",
                        "on-secondary-container": "#00714d",
                        "surface-tint": "#494bd6",
                        "tertiary-container": "#da3437",
                        "on-tertiary-container": "#fffbff",
                        "on-tertiary-fixed": "#410004",
                        "outline": "#767586",
                        "on-tertiary-fixed-variant": "#930013",
                        "surface-container-high": "#dce9ff",
                        "secondary": "#006c49",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-primary-fixed": "#07006c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-min": "2.75rem",
                        "section-gap": "1.5rem",
                        "container-margin": "1rem",
                        "inline-padding": "1rem",
                        "stack-gap": "0.75rem"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-flashcard": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-flashcard": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background flex flex-col h-screen overflow-hidden">
<!-- Top App Bar -->
<header class="bg-surface text-primary font-headline-md text-headline-md docked full-width top-0 sticky z-40 flat no shadows flex justify-between items-center h-16 px-4 w-full md:hidden">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 active:scale-90 transition-all text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-headline-md text-headline-md font-bold text-primary">Ứng dụng Học tập</span>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 active:scale-90 transition-all text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-container-margin py-section-gap flex flex-col gap-section-gap relative">
<!-- Progress Bar -->
<div class="w-full">
<div class="flex justify-between items-center mb-2">
<span class="font-label-sm text-label-sm text-on-surface-variant">Tiến độ</span>
<span class="font-label-sm text-label-sm text-primary font-bold">1/20</span>
</div>
<div class="h-2 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-300" style="width: 5%;"></div>
</div>
</div>
<!-- Prompt Card -->
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_4px_15px_rgba(0,0,0,0.06)] flex flex-col items-center justify-center min-h-[160px] text-center gap-4">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Nghĩa tiếng Việt</span>
<h2 class="font-headline-lg text-headline-lg text-on-surface">Từ bỏ, ruồng bỏ</h2>
</div>
<!-- Input Area -->
<div class="flex flex-col gap-2">
<label class="sr-only" for="answer-input">Nhập từ tiếng Anh</label>
<input autocapitalize="off" autocomplete="off" autocorrect="off" class="w-full h-14 px-4 bg-surface-container-lowest border border-outline-variant rounded-xl font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant/60 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm" id="answer-input" placeholder="Nhập từ tiếng Anh..." spellcheck="false" type="text"/>
</div>
<!-- Feedback Area (Hidden by default, shown on submit) -->
<div class="hidden rounded-lg p-4 flex items-start gap-3" id="feedback-area">
<span class="material-symbols-outlined mt-0.5" id="feedback-icon">check_circle</span>
<div class="flex flex-col">
<span class="font-label-lg text-label-lg" id="feedback-title">Chính xác!</span>
<span class="font-body-md text-body-md" id="feedback-detail">abandon /əˈbændən/ (v)</span>
</div>
</div>
<!-- Action Buttons (Keyboard Aware positioning) -->
<div class="flex flex-col gap-3 mt-auto pb-4">
<div class="flex gap-3">
<button class="flex-1 h-touch-target-min bg-surface-container-high text-on-surface font-label-lg text-label-lg rounded-xl flex items-center justify-center gap-2 hover:bg-surface-variant/50 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="lightbulb" style="font-variation-settings: 'FILL' 0;">lightbulb</span>
                    Gợi ý
                </button>
<button class="flex-1 h-touch-target-min bg-surface-container-high text-on-surface font-label-lg text-label-lg rounded-xl flex items-center justify-center gap-2 hover:bg-surface-variant/50 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="visibility" style="font-variation-settings: 'FILL' 0;">visibility</span>
                    Hiện đáp án
                </button>
</div>
<button class="w-full h-[52px] bg-primary text-on-primary font-label-lg text-label-lg rounded-xl flex items-center justify-center shadow-md hover:bg-primary/90 active:scale-95 transition-all" onclick="checkAnswer()">
                Kiểm tra
            </button>
</div>
<!-- Collapsible Section: Từ hay sai gần đây -->
<details class="group bg-surface-container-lowest rounded-xl shadow-[0_4px_15px_rgba(0,0,0,0.06)] overflow-hidden">
<summary class="w-full px-4 py-3 flex items-center justify-between cursor-pointer list-none font-label-lg text-label-lg text-on-surface hover:bg-surface-variant/30 transition-colors">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" data-icon="error">error</span>
                    Từ hay sai gần đây
                </div>
<span class="material-symbols-outlined transition-transform duration-300 group-open:rotate-180 text-on-surface-variant">expand_more</span>
</summary>
<div class="px-4 pb-4 pt-1 flex flex-col gap-2">
<div class="flex justify-between items-center p-2 rounded bg-surface-container-low">
<span class="font-body-md text-body-md text-on-surface">abundant</span>
<span class="font-label-sm text-label-sm text-error bg-error-container px-2 py-0.5 rounded-full">Sai 3 lần</span>
</div>
<div class="flex justify-between items-center p-2 rounded bg-surface-container-low">
<span class="font-body-md text-body-md text-on-surface">absence</span>
<span class="font-label-sm text-label-sm text-error bg-error-container px-2 py-0.5 rounded-full">Sai 2 lần</span>
</div>
</div>
</details>
</main>
<script>
        // Simple mock validation logic
        function checkAnswer() {
            const input = document.getElementById('answer-input').value.trim().toLowerCase();
            const feedbackArea = document.getElementById('feedback-area');
            const feedbackIcon = document.getElementById('feedback-icon');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackDetail = document.getElementById('feedback-detail');

            feedbackArea.classList.remove('hidden');

            if (input === 'abandon') {
                feedbackArea.className = 'rounded-lg p-4 flex items-start gap-3 bg-secondary-container text-on-secondary-container';
                feedbackIcon.textContent = 'check_circle';
                feedbackIcon.style.fontVariationSettings = "'FILL' 1";
                feedbackTitle.textContent = 'Chính xác!';
                feedbackTitle.className = 'font-label-lg text-label-lg text-on-secondary-container';
                feedbackDetail.textContent = 'abandon /əˈbændən/ (v)';
                feedbackDetail.className = 'font-body-md text-body-md text-on-secondary-container opacity-90';
            } else if (input === '') {
                feedbackArea.classList.add('hidden');
            } else {
                feedbackArea.className = 'rounded-lg p-4 flex items-start gap-3 bg-error-container text-on-error-container';
                feedbackIcon.textContent = 'cancel';
                feedbackIcon.style.fontVariationSettings = "'FILL' 1";
                feedbackTitle.textContent = 'Chưa đúng!';
                feedbackTitle.className = 'font-label-lg text-label-lg text-on-error-container';
                feedbackDetail.textContent = 'Hãy thử lại hoặc dùng gợi ý.';
                feedbackDetail.className = 'font-body-md text-body-md text-on-error-container opacity-90';
            }
        }

        // Handle Enter key
        document.getElementById('answer-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body></html>
