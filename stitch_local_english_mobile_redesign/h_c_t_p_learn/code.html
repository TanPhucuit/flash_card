<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Learn Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#e1e0ff",
                        "surface-container-highest": "#d3e4fe",
                        "on-error": "#ffffff",
                        "primary": "#4648d4",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "surface-bright": "#f8f9ff",
                        "on-secondary-fixed": "#002113",
                        "inverse-primary": "#c0c1ff",
                        "surface-container": "#e5eeff",
                        "surface-container-low": "#eff4ff",
                        "tertiary-fixed": "#ffdad7",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "tertiary": "#b61722",
                        "on-primary-container": "#fffbff",
                        "secondary-fixed": "#6ffbbe",
                        "inverse-surface": "#213145",
                        "secondary-container": "#6cf8bb",
                        "surface-variant": "#d3e4fe",
                        "on-secondary-fixed-variant": "#005236",
                        "secondary-fixed-dim": "#4edea3",
                        "inverse-on-surface": "#eaf1ff",
                        "outline-variant": "#c7c4d7",
                        "error": "#ba1a1a",
                        "on-background": "#0b1c30",
                        "background": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "primary-container": "#6063ee",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface": "#f8f9ff",
                        "on-surface": "#0b1c30",
                        "on-surface-variant": "#464554",
                        "surface-dim": "#cbdbf5",
                        "on-secondary-container": "#00714d",
                        "surface-tint": "#494bd6",
                        "tertiary-container": "#da3437",
                        "on-tertiary-container": "#fffbff",
                        "on-tertiary-fixed": "#410004",
                        "outline": "#767586",
                        "on-tertiary-fixed-variant": "#930013",
                        "surface-container-high": "#dce9ff",
                        "secondary": "#006c49",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-primary-fixed": "#07006c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-min": "2.75rem",
                        "section-gap": "1.5rem",
                        "container-margin": "1rem",
                        "inline-padding": "1rem",
                        "stack-gap": "0.75rem"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-flashcard": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-flashcard": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC; /* Level 0 Base */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center overflow-x-hidden md:hidden">
<!-- Top Navigation & Progress (Transactional/Task Focused - Bottom/Side Nav Suppressed) -->
<header class="w-full flex justify-between items-center h-16 px-container-margin bg-surface z-40 sticky top-0">
<button class="flex items-center justify-center p-2 rounded-full text-on-surface-variant hover:opacity-80 active:scale-90 transition-all focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<span aria-hidden="true" class="material-symbols-outlined">close</span>
<span class="sr-only">Đóng bài học</span>
</button>
<div class="flex-1 px-4 flex items-center">
<div class="w-full bg-surface-variant rounded-full h-2 relative overflow-hidden">
<div class="bg-primary h-2 rounded-full absolute top-0 left-0 transition-all duration-500" style="width: 45%;"></div>
</div>
</div>
<div class="flex items-center gap-1 bg-surface-container py-1 px-2.5 rounded-full border border-surface-container-highest shadow-sm">
<span aria-hidden="true" class="material-symbols-outlined text-tertiary-container fill-icon text-lg">local_fire_department</span>
<span class="font-label-lg text-label-lg text-on-surface font-bold">12</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full flex-1 flex flex-col px-container-margin pt-section-gap pb-8 max-w-md mx-auto relative z-10">
<!-- Question Section -->
<section class="flex flex-col items-center justify-center min-h-[221px] mb-section-gap text-center px-4 w-full bg-surface rounded-2xl shadow-[0_4px_15px_rgba(0,0,0,0.06)] py-8 border border-surface-container-low">
<h2 class="font-body-md text-body-md text-on-surface-variant mb-4 uppercase tracking-wider font-semibold">Chọn nghĩa đúng</h2>
<p class="font-display-flashcard text-display-flashcard text-on-surface leading-tight">abandon</p>
<button class="mt-4 text-primary hover:text-primary-container transition-colors p-2 rounded-full active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 bg-surface-container-lowest shadow-sm border border-surface-container-low">
<span aria-hidden="true" class="material-symbols-outlined fill-icon text-2xl">volume_up</span>
<span class="sr-only">Phát âm</span>
</button>
</section>
<!-- Answers Section -->
<section class="flex flex-col gap-stack-gap w-full flex-1 justify-end pb-4">
<!-- Answer Option (Default State) -->
<button class="w-full min-h-touch-target-min py-4 px-6 rounded-xl bg-surface border-2 border-surface-container-highest text-left shadow-sm hover:border-primary/50 hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-between group focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<span class="font-body-lg text-body-lg text-on-surface font-medium group-hover:text-primary transition-colors">Đầu tư</span>
<span class="w-6 h-6 rounded-full border-2 border-surface-container-highest group-hover:border-primary/50 flex items-center justify-center transition-colors"></span>
</button>
<!-- Answer Option (Selected / Wrong State Simulation - for design review) -->
<button class="w-full min-h-touch-target-min py-4 px-6 rounded-xl bg-error-container border-2 border-error text-left shadow-sm active:scale-[0.98] transition-all flex items-center justify-between focus:outline-none focus:ring-2 focus:ring-error focus:ring-offset-2 relative overflow-hidden">
<div class="absolute inset-0 bg-error/5 opacity-50"></div>
<span class="font-body-lg text-body-lg text-on-error-container font-semibold relative z-10">Thành công</span>
<span class="w-6 h-6 rounded-full bg-error flex items-center justify-center relative z-10">
<span aria-hidden="true" class="material-symbols-outlined text-on-error text-sm font-bold">close</span>
</span>
</button>
<!-- Answer Option (Selected / Correct State Simulation - for design review) -->
<button class="w-full min-h-touch-target-min py-4 px-6 rounded-xl bg-secondary-container border-2 border-secondary text-left shadow-sm active:scale-[0.98] transition-all flex items-center justify-between focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 relative overflow-hidden">
<div class="absolute inset-0 bg-secondary/5 opacity-50"></div>
<span class="font-body-lg text-body-lg text-on-secondary-container font-semibold relative z-10">Từ bỏ</span>
<span class="w-6 h-6 rounded-full bg-secondary flex items-center justify-center relative z-10 shadow-sm">
<span aria-hidden="true" class="material-symbols-outlined text-on-secondary text-sm font-bold">check</span>
</span>
</button>
<!-- Answer Option (Default State) -->
<button class="w-full min-h-touch-target-min py-4 px-6 rounded-xl bg-surface border-2 border-surface-container-highest text-left shadow-sm hover:border-primary/50 hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-between group focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<span class="font-body-lg text-body-lg text-on-surface font-medium group-hover:text-primary transition-colors">Gặp gỡ</span>
<span class="w-6 h-6 rounded-full border-2 border-surface-container-highest group-hover:border-primary/50 flex items-center justify-center transition-colors"></span>
</button>
</section>
<!-- Bottom Action -->
<div class="w-full pt-4 mt-auto">
<button class="w-full min-h-[52px] font-label-lg text-label-lg font-bold text-on-surface-variant bg-transparent border border-outline-variant rounded-xl hover:bg-surface-variant hover:text-on-surface hover:border-outline active:scale-[0.98] transition-all focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 py-3">
                Tôi không biết
            </button>
</div>
</main>
<!-- Success Feedback Overlay (Simulated Active State) -->
<!-- In a real app, this would animate up from bottom. Using a fixed container for demonstration. -->
<div class="fixed bottom-0 w-full bg-surface shadow-[0_-8px_20px_rgba(0,0,0,0.1)] z-50 rounded-t-2xl transform translate-y-full transition-transform duration-300 border-t-4 border-secondary hidden" id="feedback-sheet">
<div class="p-container-margin pb-8 flex flex-col gap-4">
<div class="flex items-start justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center shadow-sm">
<span aria-hidden="true" class="material-symbols-outlined text-on-secondary-container font-bold text-xl">check</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-secondary font-bold">Tuyệt vời!</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Nghĩa là: <strong>Từ bỏ</strong></p>
</div>
</div>
<button class="text-on-surface-variant hover:text-on-surface p-1 rounded-full focus:outline-none focus:ring-2 focus:ring-primary">
<span aria-hidden="true" class="material-symbols-outlined">flag</span>
</button>
</div>
<button class="w-full min-h-[52px] bg-secondary text-on-secondary font-label-lg text-label-lg rounded-xl font-bold shadow-md hover:opacity-90 active:scale-[0.98] transition-all focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 mt-2">
                 Tiếp tục
             </button>
</div>
</div>
<script>
        // Simple script to toggle feedback sheet for demonstration
        // Note: The selected states above are hardcoded for design visualization.
        // In a real implementation, JS would handle these state changes.
        document.addEventListener('DOMContentLoaded', () => {
            const correctBtn = document.querySelector('.bg-secondary-container');
            const sheet = document.getElementById('feedback-sheet');
            
            if(correctBtn && sheet) {
                // Simulate showing correct feedback on click
                correctBtn.addEventListener('click', () => {
                    sheet.classList.remove('translate-y-full', 'hidden');
                });
            }
        });
    </script>
</body></html>
